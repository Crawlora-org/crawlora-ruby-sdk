name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write # GitHub Packages (gem registry)

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Verify tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME#v}"           # e.g. 1.5.0-sdk.2
          version="$(ruby -Ilib -rcrawlora/version -e 'print Crawlora::VERSION')"
          # Crawlora::VERSION uses the shared -sdk.N tag form; RubyGems normalizes
          # the published gem to the .pre.sdk.N prerelease form at build time.
          if [ "$version" != "$tag" ]; then
            echo "tag $tag != Crawlora::VERSION $version" >&2
            exit 1
          fi
      - name: Regenerate and verify
        run: |
          python3 scripts/generate.py
          git diff --exit-code
      - name: Test
        run: bundle exec rake test
      - name: Build gem
        run: gem build crawlora.gemspec
      # GitHub Packages works with the built-in GITHUB_TOKEN — no external account
      # needed. Skips cleanly if the version is already published.
      - name: Publish to GitHub Packages
        run: |
          mkdir -p ~/.gem
          printf -- "---\n:github: Bearer %s\n" "${GITHUB_TOKEN}" > ~/.gem/credentials
          chmod 600 ~/.gem/credentials
          gem=$(ls crawlora-*.gem | head -1)
          if gem push --key github --host "https://rubygems.pkg.github.com/Crawlora-org" "$gem"; then
            echo "published $gem to GitHub Packages"
          else
            echo "gem push to GitHub Packages failed (already published?); continuing" >&2
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Public RubyGems publication via the gem API key (secret RUBYGEMS_API_KEY).
      # Skips cleanly when the secret is absent or the version already exists, so
      # the release stays green. The account must keep MFA "UI only" (no OTP for
      # API). To switch to OIDC trusted publishing instead, drop this step's
      # GEM_HOST_API_KEY and use `rubygems/release-gem@v1` with id-token: write.
      - name: Publish to RubyGems
        if: ${{ env.RUBYGEMS_API_KEY != '' }}
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          gem=$(ls crawlora-*.gem | head -1)
          if gem push "$gem"; then
            echo "published $gem to RubyGems"
          else
            echo "gem push to RubyGems failed (already published?); continuing" >&2
          fi
