AllCops:
  TargetRubyVersion: 3.0
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "lib/crawlora/operations.rb" # generated
    - "vendor/**/*"
    - "scripts/**/*"

# Metric cops are enabled with generous-but-real budgets. The Client is a single
# cohesive HTTP client (large by nature), and its constructor takes many keyword
# options, so ClassLength is off and keyword args don't count toward arg lists.
Metrics/ClassLength:
  Enabled: false

Metrics/ParameterLists:
  CountKeywordArgs: false

Metrics/MethodLength:
  Max: 45

Metrics/AbcSize:
  Max: 55

Metrics/CyclomaticComplexity:
  Max: 16

Metrics/PerceivedComplexity:
  Max: 18

# Require parentheses around compound ternary conditions (e.g. `(a || b) ? …`).
Style/TernaryParentheses:
  EnforcedStyle: require_parentheses_when_complex

Metrics/BlockLength:
  Exclude:
    - "test/**/*"
    - "*.gemspec"

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Style/FrozenStringLiteralComment:
  Enabled: true

Layout/LineLength:
  Max: 140

Lint/MissingSuper:
  Enabled: false

Naming/AccessorMethodName:
  Enabled: false
